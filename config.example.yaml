# OpenList Bot 配置文件
# 复制此文件为 config.yaml 并修改配置值

log_level: INFO

# 用户配置
# admin: 管理员 Telegram 用户 ID（拥有全部权限）
# bot_token: Telegram Bot Token（从 @BotFather 获取）
# member: 允许使用 /search 等命令的用户/群组 ID 白名单
#         留空 [] 表示所有人可用，非空则只有列表中的 ID 可用
user:
  admin: 1234567890
  bot_token: "your_bot_token_here"
  member: []

# OpenList 配置
openlist:
  openlist_host: "https://openlist.your-domain.com"
  openlist_token: "your_openlist_token"
  download_path: /115/girl
  download_tool: 115 Cloud

# 盘搜配置（可选）
pansou:
  pansou_host: "https://pansou.your-domain.com"
  pansou_token: "your_pansou_token"

# 代理配置（可选）
proxy:
  enable: false
  hostname: 127.0.0.1
  port: 10808
  scheme: http
